name: Research and Personalize Leads (for Mailmeteor)

on:
  schedule:
    - cron: "0 4 * * 1-5" # 4:00 AM UTC = 9:30 AM IST, Mon-Fri
  workflow_dispatch: {}

jobs:
  research-and-personalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run research + personalization bot
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          SENDER_NAME: "Salman"
          DAILY_LEAD_LIMIT: "100"
        run: node research-and-personalize.js
